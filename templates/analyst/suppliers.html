{% extends "analyst/base.html" %}
{% block title %}Suppliers{% endblock %}
{% block page_title %}Suppliers{% endblock %}

{% block content %}
<div class="card">
  <div class="card-header" style="flex-wrap:wrap;gap:12px">
    <div style="display:flex;align-items:center;gap:10px">
      <div class="card-title"><i class="fas fa-truck-ramp-box" style="color:#6366f1"></i> All Suppliers</div>
      <span id="supCount" class="badge badge-blue">—</span>
    </div>
    <div style="position:relative">
      <i class="fas fa-search" style="position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:.8rem"></i>
      <input type="text" id="supSearch" class="form-control" placeholder="Search supplier…" style="padding-left:32px;width:200px" oninput="debounce()"/>
    </div>
  </div>
  <div class="table-wrap">
    <table>
      <thead><tr><th>#</th><th>Supplier ID</th><th>Name</th><th>Email</th><th>Phone</th><th>Status</th></tr></thead>
      <tbody id="supTbody"><tr><td colspan="8" style="text-align:center;padding:32px"><span class="spinner"></span></td></tr></tbody>
    </table>
  </div>
  <div id="supPag"></div>
</div>
{% endblock %}

{% block scripts %}
<script>
let supPage=1, supTimer=null;
function debounce(){clearTimeout(supTimer);supTimer=setTimeout(()=>loadSuppliers(1),300);}

async function loadSuppliers(page=1){
  supPage=page;
  const q=document.getElementById('supSearch').value.trim();
  const {ok,data}=await apiFetch(`/analyst/api/suppliers?page=${page}&q=${encodeURIComponent(q)}`);
  if(!ok)return;
  document.getElementById('supCount').textContent=data.total||0;
  const tbody=document.getElementById('supTbody');
  const rows=data.records||[];
  if(!rows.length){tbody.innerHTML='<tr><td colspan="8"><div class="empty-state"><i class="fas fa-truck-ramp-box"></i><p>No suppliers found</p></div></td></tr>';document.getElementById('supPag').innerHTML='';return;}
  tbody.innerHTML=rows.map((r,i)=>`<tr>
    <td style="color:var(--muted)">${(page-1)*20+i+1}</td>
    <td style="font-weight:600;font-family:monospace">${r.supplier_id||'—'}</td>
    <td style="font-weight:500">${r.supplier_name||'—'}</td>
    <td style="color:var(--muted)">${r.email||'—'}</td>
    <td style="color:var(--muted)">${r.phone||'—'}</td>
    <td><span class="badge ${r.status==='Active'?'badge-green':'badge-red'}">${r.status||'—'}</span></td>
  </tr>`).join('');
  renderPag('supPag',page,data.total,20,'loadSuppliers');
}
loadSuppliers(1);
</script>
{% endblock %}
